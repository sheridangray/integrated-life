name: iOS Build & Deploy

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme to build'
        required: false
        default: 'IntegratedLife'
        type: choice
        options:
          - IntegratedLife
          - IntegratedLife-Staging

env:
  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
  DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM_ID }}

jobs:
  determine-track:
    runs-on: ubuntu-latest
    outputs:
      track: ${{ steps.set-track.outputs.track }}
      scheme: ${{ steps.set-track.outputs.scheme }}
      configuration: ${{ steps.set-track.outputs.configuration }}
    steps:
      - name: Set track based on branch
        id: set-track
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "track=production" >> $GITHUB_OUTPUT
            echo "scheme=IntegratedLife" >> $GITHUB_OUTPUT
            echo "configuration=Release" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "track=internal" >> $GITHUB_OUTPUT
            echo "scheme=IntegratedLife-Staging" >> $GITHUB_OUTPUT
            echo "configuration=Staging" >> $GITHUB_OUTPUT
          else
            echo "track=none" >> $GITHUB_OUTPUT
          fi

  build-ios:
    needs: determine-track
    if: needs.determine-track.outputs.track != 'none'
    runs-on: macos-15
    env:
      SCHEME: ${{ needs.determine-track.outputs.scheme }}
      CONFIGURATION: ${{ needs.determine-track.outputs.configuration }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup App Store Connect API Key for xcodebuild
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          AUTH_KEY_FILE=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" > "$AUTH_KEY_FILE"
          echo "AUTH_KEY_PATH=$AUTH_KEY_FILE" >> $GITHUB_ENV

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Import distribution certificate
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          echo -n "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}" -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

      - name: Import provisioning profile
        run: |
          PROFILE_PATH=$RUNNER_TEMP/IntegratedLife.mobileprovision
          echo -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (for OpenAPI Generator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Generate Swift models (without Docker)
        run: |
          cat > openapitools-ci.json << 'EOF'
          {
            "$schema": "./node_modules/@openapitools/openapi-generator-cli/config.schema.json",
            "generator-cli": {
              "version": "7.19.0",
              "useDocker": false,
              "generators": {
                "swift": {
                  "generatorName": "swift5",
                  "inputSpec": "openapi.json",
                  "output": "./client-mobile/Generated",
                  "additionalProperties": {
                    "projectName": "IntegratedLifeAPI"
                  }
                }
              }
            }
          }
          EOF
          mv openapitools.json openapitools-original.json
          mv openapitools-ci.json openapitools.json
          node scripts/generate-swift.js
          mv openapitools-original.json openapitools.txt

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: client-mobile
        run: xcodegen generate

      - name: Resolve package dependencies
        working-directory: client-mobile
        run: xcodebuild -resolvePackageDependencies -project IntegratedLife.xcodeproj -scheme $SCHEME

      - name: Print configuration
        run: |
          echo "Building scheme: $SCHEME"
          echo "Configuration: $CONFIGURATION"
          echo "Track: ${{ needs.determine-track.outputs.track }}"
          echo "Development Team: $DEVELOPMENT_TEAM"

      - name: Build and archive app
        working-directory: client-mobile
        run: |
          xcodebuild \
            -project IntegratedLife.xcodeproj \
            -scheme $SCHEME \
            -configuration $CONFIGURATION \
            -destination 'generic/platform=iOS' \
            -archivePath build/IntegratedLife.xcarchive \
            archive \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        working-directory: client-mobile
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/IntegratedLife.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight (Internal - Staging)
        if: needs.determine-track.outputs.track == 'internal'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          app-store-connect-key-content: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          app-path: client-mobile/build/export/IntegratedLife.ipa
          group: 'Internal Testers'

      - name: Upload to TestFlight (Production)
        if: needs.determine-track.outputs.track == 'production'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          app-store-connect-key-content: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          app-path: client-mobile/build/export/IntegratedLife.ipa

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ needs.determine-track.outputs.track }}
          path: client-mobile/build/export/
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH || true