name: iOS Build & Deploy

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme to build'
        required: false
        default: 'IntegratedLife'
        type: choice
        options:
          - IntegratedLife
          - IntegratedLife-Staging

env:
  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

jobs:
  determine-track:
    runs-on: ubuntu-latest
    outputs:
      track: ${{ steps.set-track.outputs.track }}
      scheme: ${{ steps.set-track.outputs.scheme }}
      configuration: ${{ steps.set-track.outputs.configuration }}
    steps:
      - name: Set track based on branch
        id: set-track
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "track=production" >> $GITHUB_OUTPUT
            echo "scheme=IntegratedLife" >> $GITHUB_OUTPUT
            echo "configuration=Release" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "track=internal" >> $GITHUB_OUTPUT
            echo "scheme=IntegratedLife-Staging" >> $GITHUB_OUTPUT
            echo "configuration=Staging" >> $GITHUB_OUTPUT
          else
            echo "track=none" >> $GITHUB_OUTPUT
          fi

  build-ios:
    needs: determine-track
    if: needs.determine-track.outputs.track != 'none'
    runs-on: macos-15
    env:
      SCHEME: ${{ needs.determine-track.outputs.scheme }}
      CONFIGURATION: ${{ needs.determine-track.outputs.configuration }}
      DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install Apple signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p actions $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p actions $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k actions $KEYCHAIN_PATH

          # Add to keychain list and set as default
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (for OpenAPI Generator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Generate Swift models (without Docker)
        run: |
          cat > openapitools-ci.json << 'EOF'
          {
            "$schema": "./node_modules/@openapitools/openapi-generator-cli/config.schema.json",
            "generator-cli": {
              "version": "7.19.0",
              "useDocker": false,
              "generators": {
                "swift": {
                  "generatorName": "swift5",
                  "inputSpec": "openapi.json",
                  "output": "./client-mobile/Generated",
                  "additionalProperties": {
                    "projectName": "IntegratedLifeAPI"
                  }
                }
              }
            }
          }
          EOF
          mv openapitools.json openapitools-original.json
          mv openapitools-ci.json openapitools.json
          node scripts/generate-swift.js
          mv openapitools-original.json openapitools.json

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: client-mobile
        run: xcodegen generate

      - name: Resolve package dependencies
        working-directory: client-mobile
        run: xcodebuild -resolvePackageDependencies -project IntegratedLife.xcodeproj -scheme $SCHEME

      - name: Print configuration
        run: |
          echo "Building scheme: $SCHEME"
          echo "Configuration: $CONFIGURATION"
          echo "Track: ${{ needs.determine-track.outputs.track }}"
          echo "Development Team: $DEVELOPMENT_TEAM"

      - name: Build app (build only, no archive)
        working-directory: client-mobile
        run: |
          xcodebuild \
            -project IntegratedLife.xcodeproj \
            -scheme $SCHEME \
            -configuration $CONFIGURATION \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY='Apple Development' \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            -allowProvisioningUpdates \
            -allowProvisioningRegistration

      - name: Create IPA from build
        working-directory: client-mobile
        run: |
          # Find the app bundle
          APP_PATH=$(find build/DerivedData/Build/Products -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"

          # Create IPA payload structure
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/

          # Create IPA
          cd build/ipa
          zip -r ../IntegratedLife.ipa Payload

      - name: Upload to TestFlight (Internal - Staging)
        if: needs.determine-track.outputs.track == 'internal'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          app-store-connect-key-content: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          app-path: client-mobile/build/IntegratedLife.ipa
          group: 'Internal Testers'

      - name: Upload to TestFlight (Production)
        if: needs.determine-track.outputs.track == 'production'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          app-store-connect-key-content: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          app-path: client-mobile/build/IntegratedLife.ipa

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ needs.determine-track.outputs.track }}
          path: client-mobile/build/IntegratedLife.ipa
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true