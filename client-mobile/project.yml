name: IntegratedLife
options:
  bundleIdPrefix: com.integratedlife
  xcconfigTemplatePath: Config.xcconfig
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.integratedlife.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: IntegratedLife/Info.plist

configs:
  Debug: debug
  Release: release
  Staging: release

schemes:
  IntegratedLife:
    build:
      targets:
        IntegratedLife: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  IntegratedLife-Staging:
    build:
      targets:
        IntegratedLife: all
    run:
      config: Debug
    profile:
      config: Staging
    archive:
      config: Staging
  IntegratedLife-Device:
    build:
      targets:
        IntegratedLife: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  IntegratedLifeTests:
    build:
      targets:
        IntegratedLifeTests: all
    test:
      config: Debug
      targets:
        - IntegratedLifeTests

targets:
  IntegratedLife:
    type: application
    platform: iOS
    sources:
      - path: IntegratedLife
    configFiles:
      Debug: Config.xcconfig
      Release: Config.Release.xcconfig
      Staging: Config.Staging.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: true
        GENERATE_INFOPLIST_FILE: true
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        SWIFT_EMIT_LOCALIZATION_STRINGS: NO
    entitlements:
      path: IntegratedLife/IntegratedLife.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: GoogleSignIn
    info:
      path: IntegratedLife/Info.plist
      properties:
        API_BASE_URL: $(API_BASE_URL)
        GOOGLE_CLIENT_ID: $(GOOGLE_CLIENT_ID)
        NSHealthShareUsageDescription: "Integrated Life reads your health data including heart rate, activity, sleep, environmental metrics, and Health profile fields (date of birth and biological sex as gender) when you import them, to provide personalized insights."
        NSHealthUpdateUsageDescription: "Integrated Life saves your workout data to Apple Health so your activity is tracked in one place."
        CFBundleDisplayName: Integrated Life
        CFBundleName: Integrated Life
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSApplicationQueriesSchemes:
          - "com.googleusercontent.apps"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "$(REVERSED_CLIENT_ID)"

  IntegratedLifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IntegratedLifeTests
    dependencies:
      - target: IntegratedLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.integratedlife.tests
        ENABLE_TESTABILITY: YES